name: Multitenant Secret Monitoring 🔑

# Workshop demo: for each tenant in secrets.TENANT_IDS (comma-separated),
# auth via OIDC against the Stage-18 multi-tenant app, then count Entra
# app secrets and flag any expiring soon. Writes one section per tenant
# to the run summary.

on:
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Flag secrets expiring within this many days"
        required: false
        default: "30"

permissions:
  id-token: write
  contents: read

jobs:
  fan-out:
    name: Resolve tenant list
    runs-on: ubuntu-latest
    environment: monitoring
    outputs:
      tenants: ${{ steps.split.outputs.tenants }}
      count: ${{ steps.split.outputs.count }}
    steps:
      - name: Split TENANT_IDS into matrix list
        id: split
        shell: pwsh
        env:
          TENANT_IDS: ${{ secrets.TENANT_IDS }}
        run: |
          $ids = @()
          if (-not [string]::IsNullOrWhiteSpace($env:TENANT_IDS)) {
            $ids = @($env:TENANT_IDS -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
          }
          $json = ConvertTo-Json -InputObject @($ids) -Compress
          "tenants=$json"       | Out-File $env:GITHUB_OUTPUT -Append
          "count=$($ids.Count)" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved $($ids.Count) tenant id(s): $json"

  monitor:
    name: Count secrets in ${{ matrix.tenant_id }}
    needs: fan-out
    if: needs.fan-out.outputs.count != '0'
    runs-on: ubuntu-latest
    environment: monitoring
    strategy:
      fail-fast: false
      matrix:
        tenant_id: ${{ fromJSON(needs.fan-out.outputs.tenants) }}
    steps:
      - name: Log in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ matrix.tenant_id }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      - name: Inventory app secrets 🔑
        id: inventory
        shell: pwsh
        env:
          TENANT_ID: ${{ matrix.tenant_id }}
          WARNING_DAYS: ${{ github.event.inputs.warning_days || '30' }}
        run: |
          Install-Module -Name Az -Scope CurrentUser -Force -AllowClobber
          Install-Module -Name Microsoft.Graph.Applications -Scope CurrentUser -Force -AllowClobber

          $token = (Get-AzAccessToken -ResourceTypeName MSGraph -AsSecureString -ErrorAction Stop).token
          Connect-MgGraph $token

          $warnDays = [int]$env:WARNING_DAYS
          $now = Get-Date

          $apps = Get-MgApplication -All
          $total = 0; $expiring = 0; $expired = 0
          foreach ($app in $apps) {
            foreach ($cred in $app.PasswordCredentials) {
              $total++
              $days = ($cred.EndDateTime - $now).TotalDays
              if     ($days -lt 0)         { $expired++ }
              elseif ($days -le $warnDays) { $expiring++ }
            }
          }

          Write-Host "::group::🔑 Tenant $env:TENANT_ID"
          Write-Host "Applications scanned: $($apps.Count)" -ForegroundColor Cyan
          Write-Host "Total secrets: $total"                -ForegroundColor Cyan
          Write-Host "⚠️ Expiring (<= $warnDays days): $expiring" -ForegroundColor Yellow
          Write-Host "❌ Expired: $expired"                  -ForegroundColor Red
          Write-Host "::endgroup::"

          $summary = @"
          ## 🔑 Tenant ``$env:TENANT_ID``

          | Metric | Count |
          |--------|-------|
          | 📦 Applications scanned | $($apps.Count) |
          | 🔑 Total secrets | $total |
          | ⚠️ Expiring within $warnDays days | $expiring |
          | ❌ Expired | $expired |

          $(if ($expired -eq 0 -and $expiring -eq 0) { "✅ No expiring or expired secrets." } else { "⚠️ Review the secrets above before they cause an outage." })
          "@

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

          echo "total=$total"       >> $env:GITHUB_OUTPUT
          echo "expiring=$expiring" >> $env:GITHUB_OUTPUT
          echo "expired=$expired"   >> $env:GITHUB_OUTPUT
