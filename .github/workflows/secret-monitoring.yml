name: Multitenant Secret Monitoring

# Fans out one job per tenant ID in secrets.TENANT_IDS (comma-separated),
# authenticates to each tenant via OIDC against the Stage-18 multi-tenant
# app, enumerates Entra app credentials, and writes a Markdown expiry
# table to the run summary.

on:
  workflow_dispatch:
    inputs:
      warning_days:
        description: "Days-until-expiry threshold for the 'Expiring' classification"
        required: false
        default: "30"
  schedule:
    # Mondays at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  id-token: write
  contents: read

jobs:
  fan-out:
    name: Resolve tenant list
    runs-on: ubuntu-latest
    outputs:
      tenants: ${{ steps.split.outputs.tenants }}
    steps:
      - name: Split TENANT_IDS into matrix list
        id: split
        env:
          TENANT_IDS: ${{ secrets.TENANT_IDS }}
        run: |
          if [ -z "${TENANT_IDS}" ]; then
            echo "TENANT_IDS secret is empty — nothing to monitor." >&2
            echo "tenants=[]" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          json=$(echo -n "$TENANT_IDS" \
            | tr ',' '\n' \
            | awk 'NF { gsub(/^[ \t]+|[ \t]+$/, "", $0); printf "\"%s\"\n", $0 }' \
            | paste -sd, -)
          echo "tenants=[${json}]" >> "$GITHUB_OUTPUT"

  monitor:
    name: Monitor ${{ matrix.tenant_id }}
    needs: fan-out
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tenant_id: ${{ fromJSON(needs.fan-out.outputs.tenants) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC) for ${{ matrix.tenant_id }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ matrix.tenant_id }}
          allow-no-subscriptions: true
          enable-AzPSSession: true

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Microsoft.Graph.Applications -Scope CurrentUser -Force

      - name: Build secret inventory + summary
        shell: pwsh
        env:
          TENANT_ID: ${{ matrix.tenant_id }}
          WARNING_DAYS: ${{ github.event.inputs.warning_days || '30' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $warnDays = [int]$env:WARNING_DAYS

          $inventory = ./scripts/stage-18-secret-monitor/Get-TenantSecretInventory.ps1 `
            -TenantId $env:TENANT_ID `
            -WarningDays $warnDays `
            -UseAzContext

          $summary = $inventory | ./scripts/stage-18-secret-monitor/Format-SecretSummary.ps1

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

          $expired  = @($inventory | Where-Object Status -eq 'Expired').Count
          $expiring = @($inventory | Where-Object Status -eq 'Expiring').Count
          Write-Host "Tenant $env:TENANT_ID: expired=$expired expiring=$expiring"

      - name: Logout
        if: always()
        shell: pwsh
        run: |
          try { Disconnect-MgGraph -ErrorAction Stop } catch {}
